// =====================================================================
//  ALIASES  
// =====================================================================

// Drop the current weapon and switch to knife.
alias dropknife "drop; slot3"

// Quick disconnect.
alias dc "disconnect"

// Reload this autoexec.
alias tung "exec pigerstreet.cfg"

// Volume toggle (mute <-> 0.92), rebinds 'm' each press.
alias vol_low "volume 0; bind m vol_high"
alias vol_high "volume 0.92; bind m vol_low"

// Refund every buyable slot in the buy time window.
alias refundall "sellback 0;sellback 1;sellback 2;sellback 3;sellback 4;sellback 5;sellback 6;sellback 8;sellback 9;sellback 10;sellback 11;sellback 12;sellback 13;sellback 14;sellback 15;sellback 16;sellback 17;sellback 18;sellback 26;sellback 26;sellback 27;sellback 28;sellback 29;sellback 30;sellback 32;sellback 33;sellback 34;sellback 35;play ui\panorama\itemtile_click_02.vsnd_c"

// Hold-to-knife quick switch.
alias +pwaswitchknife slot3
alias -pwaswitchknife lastinv

// Shortcuts
alias q "quit"
alias s "status"

// AFK auto-walk (anti-idle). Each tap of the bound key advances a state
// machine: tap once to walk forward, again to also turn left -> you circle
// counter-clockwise on your own. Tap again to peel each toggle back off.
// 'blip' sounds give audio feedback that a toggle fired. Bound to F3 below.
alias blip_on "play buttons/blip1"
alias toggle-forward "toggle-forward_on"
alias toggle-forward_on "+forward; alias toggle-forward toggle-forward_off"
alias toggle-forward_off "-forward; alias toggle-forward toggle-forward_on"
alias toggle-turnleft "toggle-turnleft_on"
alias toggle-turnleft_on "+turnleft; alias toggle-turnleft toggle-turnleft_off"
alias toggle-turnleft_off "-turnleft; alias toggle-turnleft toggle-turnleft_on"
alias afk-move "cycle-forward"
alias cycle-forward "toggle-forward; alias afk-move cycle-turnleft; blip_on"
alias cycle-turnleft "toggle-turnleft; alias afk-move cycle-forward; blip_on"


// =====================================================================
//  AUDIO
// =====================================================================

// Sound volume.
