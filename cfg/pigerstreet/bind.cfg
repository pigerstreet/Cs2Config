// Remove all existing binds.
unbindall

// Updates game keyboard layout to the current Windows keyboard setting.
key_updatelayout

// Send keyboard input directly to the game engine without being processed by the operating system.
// Default: 0
cl_input_enable_raw_keyboard "0"

// Bind keys based on keyboard position instead of key name.
// Default: 1
input_button_code_is_scan_code_scd "1"

// =====================================================================
//  Your CS2 keybinds (merged from accounts 742385511 + 419484748).
//  Default ArminC binds + scripts you don't use live in extra.cfg.
// =====================================================================

// Number row.
bind "1"          "dropknife"                                                              // [1] Drop weapon + switch to knife.
bind "2"          "+spray_menu"                                                            // [2] Spray menu.
bind "3"          "slot9"                                                                  // [3] Equip: Decoy Grenade.
bind "4"          "slot5"                                                                  // [4] Equip: C4 / Medi-Shot.
bind "5"          ""                                                                       // [5] Unbound.
bind "6"          ""                                                                       // [6] Unbound.
bind "7"          ""                                                                       // [7] Unbound.
bind "8"          ""                                                                       // [8] Unbound.
bind "9"          ""                                                                       // [9] Unbound.
bind "0"          "incrementvar volume 0 0.92 0.92"                                        // [0] Toggle volume (mute <-> 0.92).

// Movement.
bind "w"          "+forward"                                                               // Move forward.
bind "a"          "+left"                                                                  // Strafe left.
bind "s"          "+back"                                                                  // Move back.
bind "d"          "+right"                                                                 // Strafe right.

// Weapon slots.
bind "o"          "slot1"                                                                  // Equip: Primary weapon.
bind "t"          "slot2"                                                                  // Equip: Secondary (pistol).
bind "p"          "slot3"                                                                  // Equip: Knife.
bind "c"          "slot6"                                                                  // Equip: HE Grenade.
bind "f"          "slot7"                                                                  // Equip: Flashbang.
bind "q"          "slot8"                                                                  // Equip: Smoke Grenade.
bind "v"          "slot10"                                                                 // Equip: Incendiary/Molotov.

// Actions.
bind "e"          "+use"                                                                   // Use (no beep).
bind "x"          "+lookatweapon"                                                          // Inspect weapon.
bind "g"          "+voicerecord"                                                           // Push-to-talk.
bind "r"          "+reload"                                                                // Reload.
bind "b"          "buymenu"                                                                // Buy menu.
bind "h"          "switchhands"                                                            // Switch viewmodel hand.
bind "i"          "show_loadout_toggle"                                                    // Toggle loadout display.
bind "z"          "player_ping"                                                            // Ping.
bind "n"          "toggle voice_modenable true false"                                      // Toggle the microphone on/off.
bind "m"          "vol_low"                                                                // Toggle volume (mute <-> 0.92).
bind "l"          "toggle volume 0 0.92"                                                   // Toggle volume (mute <-> 0.92).
bind "u"          "messagemode2"                                                           // Team chat.
bind "y"          "messagemode"                                                            // All chat.
bind ","          "buyammo1"                                                               // Buy primary ammo.
bind "."          "buyammo2"                                                               // Buy secondary ammo.
bind "`"          "toggleconsole"                                                          // Open the developer console.

// Modifiers / special keys.
bind "shift"      "+duck"                                                                  // Crouch.
bind "ctrl"       ""                                                                       // Unbound.
bind "alt"        "+sprint"                                                                // Walk (slow).
bind "capslock"   "toggleradarscale"                                                       // Toggle radar zoom.
bind "space"      "+jump"                                                                  // Jump.
bind "tab"        "+showscores"                                                            // Scoreboard.
bind "escape"     "cancelselect"                                                           // Open/close the game menu.
bind "del"        "sellbackall"                                                            // Refund all bought items.

// Mouse.
bind "mouse1"     "+attack"                                                                // Shoot.
bind "mouse2"     "+attack2"                                                               // Zoom / secondary fire.
bind "mouse3"     ""                                                                       // Unbound.
bind "mouse4"     ""                                                                       // Unbound.
bind "mouse5"     ""                                                                       // Unbound.
bind "mwheelup"   "buy vesthelm; buy ak47; buy m4a1_silencer; buy smokegrenade; buy flashbang; buy defuser" // Full-buy: armor + rifle + utility.
bind "mwheeldown" "+jump"                                                                  // Jump.
bind "mouse_x"    "yaw"                                                                    // Mouse look (horizontal).
bind "mouse_y"    "pitch"                                                                  // Mouse look (vertical).

// Arrow keys.
bind "uparrow"    "buy vesthelm; buy mp9; buy mac10; buy smokegrenade; buy flashbang; buy defuser"   // Force-buy: armor + SMG + utility.
bind "downarrow"  "css_r"                                                                  // Personal command (legacy).
bind "leftarrow"  "sensitivity 0.92286353; echo 655DPI"                                    // Switch to 655 DPI sensitivity.
bind "rightarrow" "sensitivity 0.461431765; echo 1310DPI"                                  // Switch to 1310 DPI sensitivity.

// Function keys.
bind "F3"         "buy vesthelm; buy mp9; buy mac10; buy smokegrenade; buy flashbang; buy defuser"   // Force-buy.
bind "F4"         "rebuy"                                                                  // Rebuy previous loadout.
bind "F5"         "jpeg"                                                                   // Screenshot.
bind "F6"         "disconnect"                                                             // Disconnect.
bind "F7"         "load quick"                                                             // Quick load (offline).
bind "F9"         "buy ak47;buy m4a1_silencer;buy m4a1;"                                   // Buy rifle.
bind "F10"        "buy ak47;buy m4a1_silencer;buy m4a1;"                                   // Buy rifle.
bind "F11"        "buy ak47;buy m4a1_silencer;buy m4a1;"                                   // Buy rifle.
bind "F13"        "exec whiskey"                                                           // Execute whiskey.cfg.

