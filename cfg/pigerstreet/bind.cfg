// =====================================================================
//  Input-related convars (merged from CS2).
// =====================================================================

// Prevent buy wheel from purchasing via number keys.
cl_buywheel_nonumberpurchasing "0"

// Zoom button hold (1 = one click).
cl_debounce_zoom "1"

// Detach silencer on supported weapons (0 = cannot detach).
cl_silencer_mode "0"

// Pressing +use opens the buy menu when in a buy zone.
cl_use_opens_buy_menu "0"

// The type of binding which enables mouse selection in the scoreboard.
cl_scoreboard_mouse_enable_binding "+attack2"

// Key to use for donation in the buy menu (0 = Left Control).
cl_buywheel_donate_key "0"

// Duck toggle (0 = hold to duck).
option_duck_method "0"

// Walk toggle (0 = hold to walk).
option_speed_method "0"

// When tapping the radial radio button, leave a ping if nothing is selected.
cl_radial_radio_tap_to_ping "1"

// Joystick controller support.
joystick "0"
cl_joystick_enabled "0"

// Personal player name.
name "donk"

// Personal gameplay convars (merged from CS2).
cl_buymenu_ct_nextround_high  "5000"                                                       // CT next-round "high" buy threshold.
cl_buymenu_ct_nextround_low   "1400"                                                       // CT next-round "low" buy threshold.
cl_buymenu_t_nextround_high   "5000"                                                       // T next-round "high" buy threshold.
cl_buymenu_t_nextround_low    "1400"                                                       // T next-round "low" buy threshold.
cl_inventory_radial_immediate_select "true"                                                // Radial inventory selects immediately.
cl_inventory_radial_tap_to_cycle     "true"                                                // Tap radial inventory to cycle.
cl_sniper_auto_rezoom         "true"                                                       // Auto re-zoom snipers after a shot.
