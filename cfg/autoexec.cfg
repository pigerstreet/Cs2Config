// Executing each configuration file.
exec "pigerstreet\audio.cfg"
exec "pigerstreet\bind.cfg"
exec "pigerstreet\crosshair.cfg"
exec "pigerstreet\hud.cfg"
exec "pigerstreet\mouse.cfg"
exec "pigerstreet\network.cfg"
exec "pigerstreet\script.cfg"
exec "pigerstreet\video.cfg"
